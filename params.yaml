project:
  name: rep-learning-amazon-reviews
  random_seed: 42

data:
  dataset_name: amazon_reviews_2023
  categories:
    - Electronics
    - Home_and_Kitchen
    - Beauty_and_Personal_Care
    - Sports_and_Outdoors
  sample_per_category: 500000
  split_method: parent_asin
  train_ratio: 0.70
  val_ratio: 0.15
  test_ratio: 0.15
  min_review_tokens: 5
  max_review_tokens: 256
  # Raw text column in the interim parquet (written by the data extraction
  # notebook). Downstream scripts read the *cleaned* version via the
  # `text_column` override in configs/word2vec.yaml ("cleaned_text").
  text_column: text
  rating_column: rating
  category_column: main_category

labels:
  sentiment_map:
    negative: [1, 2]
    neutral: [3]
    positive: [4, 5]

features:
  tfidf_max_features: 100000
  tfidf_ngram_range: [1, 2]
  lsa_components: 300

word2vec:
  architecture: skipgram
  vector_size: 300
  window: 5
  min_count: 10
  epochs: 10
  negative: 10
  workers: 12          # 16-core CPU — leave 4 threads for OS + Jupyter

evaluation:
  primary_metrics:
    - macro_f1
    - accuracy
    - recall_at_10
    - mrr_at_10
  # Retrieval settings — used by src/evaluation/metrics.py and notebooks.
  retrieval_k: 10
  retrieval_query_limit: 3000   # 32 GB RAM allows 3x more query points than default
  # Clustering settings — n_clusters should match the number of categories.
  clustering_n_clusters: 4
